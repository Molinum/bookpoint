server:
  port: 8081

spring:
  application:
    name: bookpoint-ms-catalogo
  datasource:
    url: jdbc:mysql://localhost:3306/bookpoint_catalogo_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/