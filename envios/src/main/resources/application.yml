server:
  port: 8088

spring:
  application:
    name: bookpoint-ms-envios
  datasource:
    url: jdbc:mysql://localhost:3306/bookpoint_envios_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

springdoc:
  api-docs:
    path: /api/v1/envios/v3/api-docs # Cambia según el servicio

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}